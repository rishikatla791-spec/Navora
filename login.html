<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NAVORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-100 rounded-full filter blur-[100px] opacity-60"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-100 rounded-full filter blur-[100px] opacity-60"></div>

    <div class="w-full max-w-md z-10">
        <div class="glass-panel p-8 rounded-3xl shadow-2xl">
            <div class="flex flex-col items-center mb-8">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold text-2xl shadow-lg mb-4">N</div>
                <h1 class="text-2xl font-bold text-slate-800">Welcome Back</h1>
                <p class="text-slate-500 text-sm">Sign in to continue to Navora AI</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="••••••••">
                </div>
                <button type="submit" id="auth-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                    Sign In <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-slate-500">Or continue with</span></div>
            </div>

            <button id="google-btn" class="w-full bg-white border border-slate-200 text-slate-700 font-semibold py-3 rounded-xl hover:bg-slate-50 transition flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                Google Account
            </button>

            <p class="mt-8 text-center text-sm text-slate-500">
                Don't have an account? <a href="#" id="toggle-auth" class="text-blue-600 font-bold hover:underline">Create one</a>
            </p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyDDFiZ2OAahWHNSxJWa7PFAzdHAEVf5lCc",
          authDomain: "navora-a5c62.firebaseapp.com",
          projectId: "navora-a5c62",
          storageBucket: "navora-a5c62.firebasestorage.app",
          messagingSenderId: "970616609774",
          appId: "1:970616609774:web:e95117aac44c85415c8cff",
          measurementId: "G-380697P1Y8"
        };
        // -----------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Handle the redirect result when coming back from Google
        getRedirectResult(auth).then((result) => {
            if (result?.user) {
                window.location.href = '/';
            }
        }).catch((error) => {
            if (error.code !== 'auth/popup-closed-by-user') {
                alert("Google Login Error: " + error.message);
            }
        });

        let isLogin = true;

        const authBtn = document.getElementById('auth-btn');
        const toggleBtn = document.getElementById('toggle-auth');
        const googleBtn = document.getElementById('google-btn');
        const form = document.getElementById('login-form');

        // Toggle between Login and Signup
        toggleBtn.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            authBtn.innerHTML = isLogin ? 'Sign In <i data-lucide="arrow-right" class="w-4 h-4"></i>' : 'Create Account <i data-lucide="user-plus" class="w-4 h-4"></i>';
            document.querySelector('h1').innerText = isLogin ? 'Welcome Back' : 'Join Navora';
            toggleBtn.innerText = isLogin ? 'Create one' : 'Sign in instead';
            lucide.createIcons();
        };

        // Handle Email/Password
        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            authBtn.disabled = true;
            authBtn.innerText = 'Processing...';

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                window.location.href = '/';
            } catch (error) {
                alert(error.message);
                authBtn.disabled = false;
                authBtn.innerHTML = isLogin ? 'Sign In' : 'Create Account';
            }
        };

        // Handle Google Login (Redirect Method)
        googleBtn.onclick = async () => {
            try {
                await signInWithRedirect(auth, provider);
            } catch (error) {
                alert(error.message);
            }
        };

        // Redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Logged in:", user.email);
                window.location.href = "index.html";
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
